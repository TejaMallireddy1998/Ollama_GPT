steps:
  - name: 'maven:3.9.9-eclipse-temurin-21'
    id: 'Build JAR'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mvn -B clean package -DskipTests
        JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" | head -n 1)
        if [ -z "$JAR_FILE" ]; then
          echo "No JAR found in target/"
          exit 1
        fi
        cp "$JAR_FILE" target/chat-service.jar
        ls -lh target/chat-service.jar

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Commit Tag'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Latest Tag'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'OLLAMA_BASE_URL=http://34.29.228.70:11434,OLLAMA_MODEL=gemma3:1b'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'us-central1'
  _REPO: 'ollama-gpt-repo'
  _IMAGE: 'chat-service'
  _SERVICE: 'ollama-gpt'
