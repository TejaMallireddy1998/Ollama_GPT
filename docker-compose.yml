version: "3.8"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - spring-ai-network

  chat-service:
    build: .
    container_name: chat-service
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    networks:
      - spring-ai-network

volumes:
  ollama:

networks:
  spring-ai-network: